[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
inter_knot = "G33455TTFsdoxKHTLHE5MqFjUY8gCPBgZGxJKbAuuYSh"

[programs.devnet]
inter_knot = "G33455TTFsdoxKHTLHE5MqFjUY8gCPBgZGxJKbAuuYSh"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 10000

[test.validator]
bind_address = "127.0.0.1"
rpc_port = 8899

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
